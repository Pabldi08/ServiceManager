<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ServiceManager</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <div>
          <p>SSH + systemctl</p>
          <h1>ServiceManager</h1>
        </div>
      </header>

      <section class="panel">
        <h2>Gestionar servicio</h2>
        <form method="post" action="/run">
          <div class="field">
            <label for="host">Servidor</label>
            <select id="host" name="host">
              {{ host_options }}
            </select>
          </div>

          <div class="field">
            <label for="service">Servicio</label>
            <select id="service" name="service">
              {{ service_options }}
            </select>
          </div>

          <div class="field">
            <label for="action">Accion</label>
            <select id="action" name="action">
              {{ action_options }}
            </select>
          </div>

          <button type="submit">Ejecutar</button>
        </form>
      </section>

      <section class="panel discovery-panel">
        <h2>Descubrir servicios</h2>
        <p>Conecta por SSH y lista los servicios disponibles en el servidor seleccionado.</p>
        <form method="post" action="/discover" class="discover-form">
          <div class="field">
            <label for="discovery-host">Servidor</label>
            <select id="discovery-host" name="host">
              {{ discovery_host_options }}
            </select>
          </div>

          <button type="submit">Descubrir</button>
        </form>
      </section>

      {{ result }}
      {{ discovered_services }}
    </main>
  </body>
</html>
